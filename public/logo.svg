<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 50" fill="white">
  <!-- Truck icon -->
  <g transform="translate(0, 8)">
    <!-- Trailer -->
    <rect x="12" y="4" width="32" height="22" rx="1" fill="white" opacity="0.9"/>
    <line x1="14" y1="10" x2="42" y2="10" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="15" x2="42" y2="15" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="20" x2="42" y2="20" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <!-- Cab -->
    <path d="M0 10 L10 10 L10 26 L0 26 Z" fill="white" opacity="0.9"/>
    <rect x="1" y="11" width="5" height="5" rx="0.5" fill="white" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="7" cy="28" r="3" fill="white" opacity="0.7"/>
    <circle cx="20" cy="28" r="3" fill="white" opacity="0.7"/>
    <circle cx="38" cy="28" r="3" fill="white" opacity="0.7"/>
    <!-- Ground line -->
    <line x1="0" y1="32" x2="46" y2="32" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="56" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="white" letter-spacing="-0.5">
    R-WAY
  </text>
  <text x="178" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="white" opacity="0.6" letter-spacing="2">
    SHIPPING &amp; STORAGE
  </text>
</svg>
